<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alan Jolly - AR Business Card</title>

    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Look-At Component for the text label -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <!-- Custom Component: DNA Helix generation and animation -->
    <script>
        AFRAME.registerComponent('dna-helix', {
            schema: {
                basePairs: { type: 'int', default: 30 },
                radius: { type: 'number', default: 0.3 },
                height: { type: 'number', default: 2.0 },
                frequency: { type: 'number', default: 2.5 },
                strandRadius: { type: 'number', default: 0.04 },
                baseRadius: { type: 'number', default: 0.02 },
                color: { type: 'color', default: '#00ffff' },
                particleCount: { type: 'int', default: 60 }
            },

            init: function () {
                const data = this.data;
                this.Object3D = new THREE.Object3D();
                
                // Materials
                // A stylized, glowing cyan material
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(data.color),
                    emissive: new THREE.Color(data.color),
                    emissiveIntensity: 0.8,
                    roughness: 0.2,
                    metalness: 0.8,
                    transparent: true,
                    opacity: 1.0 // Will be animated by A-Frame component
                });
                // Save material reference to animate opacity later
                this.helixMaterial = material;

                // Geometries for instancing
                const sphereGeometry = new THREE.SphereGeometry(data.strandRadius, 16, 16);
                const cylinderGeometry = new THREE.CylinderGeometry(data.baseRadius, data.baseRadius, data.radius * 2, 8);
                cylinderGeometry.rotateZ(Math.PI / 2); // Orient horizontally

                // Calculate positions
                this.time = 0;
                
                // --- Build DNA Structure ---
                const helixGroup = new THREE.Group();
                
                for (let i = 0; i < data.basePairs; i++) {
                    // Normalized position from -0.5 to 0.5 along height
                    const t = i / (data.basePairs - 1);
                    const y = (t - 0.5) * data.height;
                    
                    // Angle for the double helix twist
                    const angle = t * Math.PI * 2 * data.frequency;
                    
                    const x1 = Math.cos(angle) * data.radius;
                    const z1 = Math.sin(angle) * data.radius;
                    
                    const x2 = Math.cos(angle + Math.PI) * data.radius;
                    const z2 = Math.sin(angle + Math.PI) * data.radius;

                    // Strand 1 node
                    const sphere1 = new THREE.Mesh(sphereGeometry, material);
                    sphere1.position.set(x1, y, z1);
                    helixGroup.add(sphere1);

                    // Strand 2 node
                    const sphere2 = new THREE.Mesh(sphereGeometry, material);
                    sphere2.position.set(x2, y, z2);
                    helixGroup.add(sphere2);

                    // Connecting base pair
                    const cyl = new THREE.Mesh(cylinderGeometry, material);
                    cyl.position.set(0, y, 0);
                    cyl.rotation.y = -angle; // Point towards strands
                    helixGroup.add(cyl);
                }
                
                this.Object3D.add(helixGroup);
                this.helixGroup = helixGroup;

                // --- Build Particle System ---
                const particleGeometry = new THREE.BufferGeometry();
                const particlePositions = new Float32Array(data.particleCount * 3);
                this.particleSpeeds = [];
                this.particleOffsets = [];

                for (let i = 0; i < data.particleCount * 3; i += 3) {
                    // Random spherical distribution roughly around the helix
                    const h = (Math.random() - 0.5) * data.height * 1.2;
                    const r = data.radius * 1.5 + Math.random() * 0.5;
                    const a = Math.random() * Math.PI * 2;
                    
                    particlePositions[i] = Math.cos(a) * r;
                    particlePositions[i+1] = h;
                    particlePositions[i+2] = Math.sin(a) * r;
                    
                    // Random speeds for orbiting
                    this.particleSpeeds.push({
                        speedY: (Math.random() * 0.5 + 0.1) * (Math.random() > 0.5 ? 1 : -1),
                        speedRot: (Math.random() * 1.0 + 0.5) * (Math.random() > 0.5 ? 1 : -1)
                    });
                }

                particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
                
                const particleMaterial = new THREE.PointsMaterial({
                    color: new THREE.Color('#88ffff'),
                    size: 0.03,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending
                });
                
                this.particleMaterial = particleMaterial; // for opacity fade
                this.particles = new THREE.Points(particleGeometry, particleMaterial);
                this.Object3D.add(this.particles);

                // Add constructed 3D object to A-Frame entity
                this.el.setObject3D('mesh', this.Object3D);
                
                // Reference height for hover animation
                this.baseY = this.el.object3D.position.y;
            },

            tick: function (time, timeDelta) {
                const dt = timeDelta / 1000;
                this.time += dt;

                // Rotate entire helix
                this.helixGroup.rotation.y = this.time * 0.5;

                // Gentle hover up and down
                this.el.object3D.position.y = this.baseY + Math.sin(this.time * 1.5) * 0.1;

                // Animate particles
                if (this.particles) {
                    const positions = this.particles.geometry.attributes.position.array;
                    let pIdx = 0;
                    for (let i = 0; i < positions.length; i += 3) {
                        const speed = this.particleSpeeds[pIdx];
                        
                        // Current position
                        let cx = positions[i];
                        let cy = positions[i+1];
                        let cz = positions[i+2];
                        
                        // Orbit rotation math around Y axis
                        const cosT = Math.cos(speed.speedRot * dt);
                        const sinT = Math.sin(speed.speedRot * dt);
                        const nx = cx * cosT - cz * sinT;
                        const nz = cx * sinT + cz * cosT;
                        
                        // Vertical drift
                        let ny = cy + speed.speedY * dt;
                        
                        // Wrap vertically
                        const h2 = this.data.height * 0.6;
                        if (ny > h2) ny = -h2;
                        if (ny < -h2) ny = h2;
                        
                        positions[i] = nx;
                        positions[i+1] = ny;
                        positions[i+2] = nz;

                        pIdx++;
                    }
                    this.particles.geometry.attributes.position.needsUpdate = true;
                }
            },
            
            // Allow setting global opacity for fade-in effect via other components
            updateOpacity: function(op) {
                if (this.helixMaterial) this.helixMaterial.opacity = op;
                if (this.particleMaterial) this.particleMaterial.opacity = op * 0.6; // keep particles slightly more transparent
            }
        });

        // Component to handle marker found logic (fade in)
        AFRAME.registerComponent('ar-controller', {
            init: function() {
                this.dnaEl = document.querySelector('[dna-helix]');
                this.labelEl = document.querySelector('#dna-label');
                
                // Initial hide state
                this.setOpacity(0);
                this.isFadingIn = false;
                this.fadeProgress = 0;
                this.fadeDuration = 0.7; // seconds

                this.el.addEventListener('markerFound', () => {
                    this.isFadingIn = true;
                    this.fadeProgress = 0;
                });
                
                this.el.addEventListener('markerLost', () => {
                    this.isFadingIn = false;
                    this.setOpacity(0);
                });
            },
            
            setOpacity: function(op) {
                if (this.dnaEl && this.dnaEl.components['dna-helix']) {
                    this.dnaEl.components['dna-helix'].updateOpacity(op);
                }
                if (this.labelEl) {
                    // Update text opacity
                    this.labelEl.setAttribute('text', 'opacity', op);
                }
            },
            
            tick: function(time, timeDelta) {
                if (this.isFadingIn && this.fadeProgress < 1.0) {
                    this.fadeProgress += (timeDelta / 1000) / this.fadeDuration;
                    if (this.fadeProgress > 1.0) this.fadeProgress = 1.0;
                    
                    // Ease out quad
                    const op = this.fadeProgress * (2 - this.fadeProgress);
                    this.setOpacity(op);
                }
            }
        });
        
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        /* Add a subtle UI overlay if needed later */
    </style>
</head>

<body>
    <!-- AR Scene Configuration -->
    <a-scene embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true; antialias: true; colorManagement: true;" 
        vr-mode-ui="enabled: false">

        <!-- ambient light for the helix -->
        <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
        <!-- Directional light to give some 3D shaping to the helix -->
        <a-light type="directional" color="#ffffff" intensity="0.8" position="-1 2 1"></a-light>

        <a-marker type="pattern" url="card.patt" ar-controller>
            
            <!-- 
              OCCLUSION PLANE 
              This is a hidden plane that lies perfectly flat on the marker.
              It writes to the depth buffer but not the color buffer, so any 3D object
              that dips "below" the card (y < 0) will be hidden, creating the illusion
              that the card is a solid table/base.
            -->
            <a-plane position="0 0 0" rotation="-90 0 0" width="3" height="3" 
                     material="colorWrite: false; depthWrite: true; shader: flat" 
                     render-order="0"></a-plane>

            <!-- 
              DNA HELIX
              Positioned aligned roughly with the big circular gear on the right.
              Assuming center of marker is 0,0. 
              The right side of the card would be +X.
            -->
            <a-entity dna-helix="height: 1.8; radius: 0.25; color: #00d8ff; particleCount: 80" 
                      position="1.0 1.0 0.0" 
                      scale="0.8 0.8 0.8">
            </a-entity>
            
            <!--
              GOLD LABEL
              Positioned beneath the helix. Uses look-at to always face the camera.
              We adjust its position dynamically or leave it statically anchored below the helix base.
            -->
            <a-entity id="dna-label"
                      position="1.0 0.15 0.2"
                      look-at="[camera]">
                <!-- Using a thin, stylized font, gold coloring -->
                <a-text value="Allegorix - Cyber Genetics of Security" 
                        align="center" 
                        color="#FFF4B3" 
                        width="3" 
                        scale="0.6 0.6 0.6"
                        font="mozillavr" 
                        opacity="0">
                </a-text>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>
</body>
</html>
