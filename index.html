<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Business Card - Alan jolly</title>
    <!-- Include A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Include AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- Custom Component for Clickable Link -->
    <script>
        AFRAME.registerComponent('navigate-on-click', {
            schema: { url: { default: '' } },
            init: function () {
                var url = this.data.url;
                this.el.addEventListener('click', function () {
                    window.location.href = url;
                });
            }
        });
    </script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <!-- 
      AR Scene Configuration 
      'cursor="rayOrigin: mouse"' allows tapping/clicking on objects
    -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
        renderer="logarithmicDepthBuffer: true;" vr-mode-ui="enabled: false;" cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <!-- 
              REPLACE THIS URL: 
              Swap the src value below with the URL or local file path to your custom image. 
              (e.g., "profile.jpg" or "https://yourdomain.com/image.png")
            -->
            <img id="profile-img"
                src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=300&h=300"
                crossorigin="anonymous">
        </a-assets>

        <!-- 
          MARKER SETUP:
          Using the default 'hiro' marker.
          To use a custom marker, change to <a-marker type="pattern" url="path/to/your/marker.patt"> 
        -->
        <a-marker preset="hiro">

            <!-- Floating Profile Image -->
            <!-- Position is x, y, z. y=1 floats it slightly above the marker -->
            <a-image src="#profile-img" position="0 1 -1" rotation="-90 0 0" width="1.5" height="1.5">
            </a-image>

            <!-- 3D Text: Name -->
            <a-text value="Alan jolly" color="#00ffff" align="center" position="0 0.1 0" rotation="-90 0 0"
                scale="1.5 1.5 1.5">
            </a-text>

            <!-- 3D Text: Role -->
            <a-text value="Cybersecurity Analyst & Founder" color="#ffffff" align="center" position="0 0.1 0.5"
                rotation="-90 0 0" scale="0.8 0.8 0.8">
            </a-text>

            <!-- Clickable Button (Graphic plane + Text) -->
            <a-entity class="clickable" position="0 0.1 1.2" rotation="-90 0 0"
                navigate-on-click="url: https://allegorix.com">
                <!-- Button Background -->
                <a-plane color="#007BFF" width="2" height="0.4"></a-plane>
                <!-- Button Text -->
                <a-text value="Visit Website" color="#FFFFFF" align="center" position="0 0 0.05"
                    scale="0.6 0.6 0.6"></a-text>
            </a-entity>

        </a-marker>

        <!-- Camera Setup -->
        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
