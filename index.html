<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alan Jolly - AR Business Card</title>

    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- Script to handle opening links -->
    <script>
        AFRAME.registerComponent('click-handler', {
            schema: { url: { default: 'https://allegorix.com' } },
            init: function () {
                // Function to handle the navigation
                const navigate = () => {
                    window.location.href = this.data.url;
                };

                // Event listeners for different interaction types
                this.el.addEventListener('click', navigate);
                this.el.addEventListener('touchstart', navigate);
            }
        });
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <!-- AR Scene Configuration -->
    <a-scene embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true; antialias: true;" vr-mode-ui="enabled: false">

        <!-- Assets Management System -->
        <a-assets>
            <!-- SWAP URL: Place your actual profile image link from https://alanjolly.in here -->
            <!-- We use a placeholder image here for testing purposes -->
            <img id="profile-pic"
                src="https://ui-avatars.com/api/?name=Alan+Jolly&background=222&color=0df&size=512&rounded=true"
                crossorigin="anonymous">
        </a-assets>

        <!-- 
      ================================================================================
      MARKER SETUP
      ================================================================================
      Currently using the default "hiro" marker for quick testing.
      
      TO USE YOUR CUSTOM CARD (via .patt file):
      1. Go to https://ar-js-org.github.io/AR.js/three.js/examples/marker-training/examples/generator.html
      2. Upload your business card image, and download the .patt file (e.g., 'card-marker.patt')
      3. Save 'card-marker.patt' in the same folder as this index.html
      4. Replace the <a-marker> tag below with:
         <a-marker type="pattern" url="card-marker.patt">
      ================================================================================
    -->
        <a-marker type="pattern" url="card.patt">

            <!-- 1. Profile Image (Floating above) -->
            <!-- Positioned above the card (y=1). Rotated to face the mobile layout accurately -->
            <a-image src="#profile-pic" position="0 1.2 0" rotation="-90 0 0" scale="1.2 1.2 1.2">
            </a-image>

            <!-- 2. Name: 3D Text -->
            <a-text value="Alan Jolly" position="0 0.3 0" rotation="-90 0 0" align="center" color="#00FFFF" width="5"
                font="exo2bold">
            </a-text>

            <!-- 3. Role: 3D Text -->
            <a-text value="Cybersecurity Analyst & Founder" position="0 0.1 0.5" rotation="-90 0 0" align="center"
                color="#FFFFFF" width="2.5" font="exo2bold">
            </a-text>

            <!-- 4. Clickable Button (Links to Website) -->
            <!-- Bounding entity for interactions -->
            <a-entity position="0 0 1.5" rotation="-90 0 0" class="clickable"
                click-handler="url: https://allegorix.com">

                <!-- Button Background Plane -->
                <a-plane width="2.5" height="0.6" color="#004d4d" material="opacity: 0.8; transparent: true">
                </a-plane>

                <!-- Button Text -->
                <a-text value="VISIT ALLEGORIX.COM" align="center" position="0 0 0.05" color="#00ffff" width="2.5"
                    font="exo2bold">
                </a-text>
            </a-entity>

            <!-- ========================================== -->
            <!-- 5. 3D Circuit Assembly Animation           -->
            <!-- ========================================== -->
            <!-- Positioned above the card to the top left (-x, -z) relative to card center -->
            <a-entity position="-1 0 -0.5">

                <!-- Base Circuit Board -->
                <a-box position="0 0.05 0" width="1.6" depth="1.2" height="0.05" color="#002211"
                    material="roughness: 0.9"></a-box>

                <!-- Animated Glowing Traces -->
                <a-entity position="0 0.08 0"
                    animation="property: opacity; from: 0.2; to: 1; dur: 800; dir: alternate; loop: true">
                    <a-plane position="-0.4 0 -0.2" rotation="-90 0 0" width="0.6" height="0.02"
                        color="#00ffff"></a-plane>
                    <a-plane position="0.2 0 0.3" rotation="-90 0 0" width="0.02" height="0.6"
                        color="#00ffff"></a-plane>
                    <a-plane position="0.4 0 -0.1" rotation="-90 0 0" width="0.4" height="0.02"
                        color="#00ffff"></a-plane>
                    <a-plane position="-0.2 0 0.4" rotation="-90 0 0" width="0.6" height="0.02"
                        color="#00ffff"></a-plane>
                </a-entity>

                <!-- Component 1: Memory Chip (Drops down) -->
                <!-- Position Z=0 in entity space. Y changes from 1.5 to 0.1 -->
                <a-box width="0.3" depth="0.5" height="0.08" color="#1a1a1a"
                    animation="property: position; from: -0.5 1.5 0.1; to: -0.5 0.1 0.1; dur: 2000; easing: easeInOutSine; dir: alternate; loop: true">
                </a-box>

                <!-- Component 2: Network Chip (Drops down) -->
                <a-box width="0.3" depth="0.2" height="0.06" color="#1a1a1a"
                    animation="property: position; from: 0.5 1.8 -0.3; to: 0.5 0.1 -0.3; dur: 2200; easing: easeInOutSine; dir: alternate; loop: true">
                </a-box>

                <!-- Component 3: Main CPU (Drops down) -->
                <a-entity
                    animation="property: position; from: 0 2.5 0; to: 0 0.12 0; dur: 2500; easing: easeInOutElastic; dir: alternate; loop: true">
                    <!-- CPU Silicon -->
                    <a-box width="0.6" depth="0.6" height="0.08" color="#222"></a-box>
                    <!-- CPU Core (Gold/Cyan) -->
                    <a-box position="0 0.04 0" width="0.3" depth="0.3" height="0.02" color="#00ffff"
                        material="metalness: 0.8; roughness: 0.2"></a-box>
                    <!-- CPU Label -->
                    <a-text value="ALLEGORIX" align="center" position="0 0.06 0" rotation="-90 0 0" color="#ffffff"
                        width="1.2" font="exo2bold"></a-text>
                </a-entity>

            </a-entity>

        </a-marker>

        <!-- Camera setup for Raycasting (Interactions/Clicks) -->
        <!-- Enables tapping/clicking the 3D button from the mobile device screen -->
        <a-entity camera>
            <a-entity cursor="rayOrigin: mouse; fuse: false;" raycaster="objects: .clickable;">
            </a-entity>
        </a-entity>

    </a-scene>

</body>

</html>
